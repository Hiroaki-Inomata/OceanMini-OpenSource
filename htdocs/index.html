<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
            background: linear-gradient(180deg, #1e90ff 0%, #000080 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            flex-direction: column;
        }
        .login-container {
            background: white;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
        }
        h1 {
            color: #333;
            margin-bottom: 0.4rem;
            text-align: center;
        }
        .powered-by-inline {
            text-align: center;
            color: #76bdf8;
            font-size: 1.10rem;
            font-weight: 700;
            margin-bottom: 1.4rem;
            letter-spacing: 0.01em;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #555;
            font-weight: 500;
        }
        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 1rem;
            transition: border-color 0.3s;
            box-sizing: border-box;
        }
        input[type="text"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            width: 100%;
            padding: 0.75rem;
            background: linear-gradient(180deg, #1e90ff 0%, #000080 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
        }
        button:active {
            transform: translateY(0);
        }
        .error {
            color: #e74c3c;
            margin-bottom: 1rem;
            text-align: center;
            display: none;
        }
        .error.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="login-container">
        
        <h1>OceanMini Login</h1>
        <div class="powered-by-inline">Powered By OceanDev</div>
        <div class="error" id="error-message">施設名またはユーザー名またはパスワードが正しくありません</div>
        <form action="/Login" method="POST" id="login-form">
            <div class="form-group">
                <label for="FacilityID">施設ID</label>
                <input type="text" id="facilityid" name="facilityid" required autofocus>
            </div>
            <div class="form-group">
                <label for="userID">ユーザーID</label>
                <input type="text" id="userid" name="userid" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">パスワード</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit">ログイン</button>
        </form>
    </div>

    <script>
        // URLパラメータにerrorがあればエラーメッセージを表示
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('error') === '1') {
            document.getElementById('error-message').classList.add('show');
        }
    </script>
</body>
</html>
